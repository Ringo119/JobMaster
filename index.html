<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="Job Master — the all-in-one app to plan jobs, track progress, manage clients, create invoices and get paid."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Job Master</title>
    <script>
      // Apply the saved theme/accent before first paint to avoid a flash.
      (function () {
        try {
          var theme = localStorage.getItem('jobmaster-theme');
          if (!theme) {
            theme =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          }
          if (theme === 'dark') document.documentElement.classList.add('dark');
          var accent = localStorage.getItem('jobmaster-accent');
          if (accent && accent !== 'blue') {
            document.documentElement.setAttribute('data-accent', accent);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body style="margin:0;font-family:sans-serif">
    <div id="root">
      <div id="app-loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem">
        <svg width="40" height="40" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="12" fill="#2563EB" />
          <text x="24" y="25" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="19" letter-spacing="-0.5">JM</text>
        </svg>
        <p style="margin:0;color:#475569">Loading Job Master…</p>
        <p id="app-error" style="margin:0;color:#ef4444;font-size:0.875rem;max-width:600px;text-align:center;white-space:pre-wrap"></p>
      </div>
    </div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('app-error');
        if (el) el.textContent = 'JS Error: ' + msg + (src ? '\n' + src + ':' + line : '');
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('app-error');
        if (el) el.textContent = 'Unhandled promise: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
