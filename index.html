<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="Job Master — the all-in-one app to plan jobs, track progress, manage clients, create invoices and get paid."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Job Master</title>
  </head>
  <body style="margin:0;font-family:sans-serif">
    <div id="root">
      <div id="app-loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem">
        <div style="font-size:2rem">📐</div>
        <p style="margin:0;color:#475569">Loading TenderTrack…</p>
        <p id="app-error" style="margin:0;color:#ef4444;font-size:0.875rem;max-width:600px;text-align:center;white-space:pre-wrap"></p>
      </div>
    </div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('app-error');
        if (el) el.textContent = 'JS Error: ' + msg + (src ? '\n' + src + ':' + line : '');
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('app-error');
        if (el) el.textContent = 'Unhandled promise: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
